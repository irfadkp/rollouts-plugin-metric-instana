<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 680" width="1060" height="680"
     font-family="-apple-system, 'Segoe UI', system-ui, sans-serif">

  <defs>
    <!-- arrow heads -->
    <marker id="ah-blk" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#374151"/>
    </marker>
    <marker id="ah-pur" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#6d28d9"/>
    </marker>
    <marker id="ah-grn" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#059669"/>
    </marker>
    <marker id="ah-org" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#d97706"/>
    </marker>
    <marker id="ah-red" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#dc2626"/>
    </marker>

    <!-- subtle drop shadow -->
    <filter id="sh" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000014"/>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════════════════════════════════
       BACKGROUND
  ══════════════════════════════════════════════════════════════════ -->
  <rect width="1060" height="680" fill="#f0f2f5"/>

  <!-- ══════════════════════════════════════════════════════════════════
       HEADER
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="0" y="0" width="1060" height="56" fill="#1c1c2e"/>
  <text x="530" y="22" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">rollouts-plugin-metric-instana</text>
  <text x="530" y="43" text-anchor="middle" font-size="12" fill="#9da8c0">System Architecture · IBM Instana × Argo Rollouts Canary Analysis</text>

  <!-- ══════════════════════════════════════════════════════════════════
       KUBERNETES CLUSTER BOUNDARY
       (dashed rounded rect, label top-left)
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="28" y="74" width="720" height="558" rx="18"
        fill="#ffffff" stroke="#326ce5" stroke-width="2.5" stroke-dasharray="10,5"
        filter="url(#sh)"/>
  <!-- Kubernetes logo mark (simplified gear wheel) -->
  <circle cx="60" cy="91" r="10" fill="none" stroke="#326ce5" stroke-width="2"/>
  <circle cx="60" cy="91" r="4"  fill="#326ce5"/>
  <!-- spokes -->
  <line x1="60" y1="81" x2="60" y2="77" stroke="#326ce5" stroke-width="2"/>
  <line x1="60" y1="101" x2="60" y2="105" stroke="#326ce5" stroke-width="2"/>
  <line x1="50" y1="91" x2="46" y2="91" stroke="#326ce5" stroke-width="2"/>
  <line x1="70" y1="91" x2="74" y2="91" stroke="#326ce5" stroke-width="2"/>
  <line x1="53" y1="84" x2="50" y2="81" stroke="#326ce5" stroke-width="2"/>
  <line x1="67" y1="98" x2="70" y2="101" stroke="#326ce5" stroke-width="2"/>
  <line x1="67" y1="84" x2="70" y2="81" stroke="#326ce5" stroke-width="2"/>
  <line x1="53" y1="98" x2="50" y2="101" stroke="#326ce5" stroke-width="2"/>
  <text x="78" y="96" font-size="12" font-weight="700" fill="#326ce5">Kubernetes Cluster</text>

  <!-- ══════════════════════════════════════════════════════════════════
       [A] ConfigMap  ── library symbol [3]: server-style rectangle
       Position: top-left of cluster
  ══════════════════════════════════════════════════════════════════ -->
  <!-- outer box -->
  <rect x="56" y="118" width="158" height="80" rx="8"
        fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
  <!-- top colour bar (server rack style from lib) -->
  <rect x="56" y="118" width="158" height="10" rx="8" fill="#2563eb"/>
  <rect x="56" y="124" width="158" height="4"  fill="#2563eb"/>
  <!-- server LED dots -->
  <circle cx="74" cy="123" r="3" fill="#93c5fd"/>
  <circle cx="84" cy="123" r="3" fill="#93c5fd"/>
  <!-- label -->
  <text x="135" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">ConfigMap</text>
  <text x="135" y="165" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">argo-rollouts-config</text>
  <text x="135" y="183" text-anchor="middle" font-size="10" fill="#3b82f6">plugin location + sha256</text>

  <!-- ══════════════════════════════════════════════════════════════════
       [B] Argo Rollouts Controller  ── lib [1]: Application server
       Position: centre-left of cluster
  ══════════════════════════════════════════════════════════════════ -->
  <!-- lib [1] style: grey #eeeeee fill rect ~96×94, label below -->
  <rect x="56" y="248" width="158" height="120" rx="8"
        fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#sh)"/>
  <!-- server-rack top bar -->
  <rect x="56" y="248" width="158" height="10" rx="8" fill="#7c3aed"/>
  <rect x="56" y="254" width="158" height="4"  fill="#7c3aed"/>
  <circle cx="74" cy="253" r="3" fill="#c4b5fd"/>
  <circle cx="84" cy="253" r="3" fill="#c4b5fd"/>
  <!-- icon area: simple controller gears suggestion -->
  <rect x="90" y="276" width="74" height="44" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="127" y="298" text-anchor="middle" font-size="20" fill="#6d28d9">⚙</text>
  <text x="127" y="314" text-anchor="middle" font-size="10" fill="#6d28d9">controller</text>
  <!-- label -->
  <text x="135" y="345" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">Argo Rollouts</text>
  <text x="135" y="360" text-anchor="middle" font-size="12" font-weight="600" fill="#4c1d95">Controller</text>

  <!-- ══════════════════════════════════════════════════════════════════
       [C] Plugin Binary (RPC Server)  ── lib [2]: Multi-Instance server
       Position: centre of cluster
  ══════════════════════════════════════════════════════════════════ -->
  <!-- lib [2] style: 3 stacked rectangles offset ~6px each -->
  <!-- back-most layer (darkest) -->
  <rect x="318" y="230" width="158" height="120" rx="8"
        fill="#d1fae5" stroke="#059669" stroke-width="1.5" filter="url(#sh)"/>
  <!-- mid layer -->
  <rect x="312" y="238" width="158" height="120" rx="8"
        fill="#a7f3d0" stroke="#059669" stroke-width="1.5" filter="url(#sh)"/>
  <!-- front layer -->
  <rect x="306" y="246" width="158" height="120" rx="8"
        fill="#ecfdf5" stroke="#059669" stroke-width="2" filter="url(#sh)"/>
  <!-- top bar -->
  <rect x="306" y="246" width="158" height="10" rx="8" fill="#059669"/>
  <rect x="306" y="252" width="158" height="4"  fill="#059669"/>
  <circle cx="322" cy="251" r="3" fill="#6ee7b7"/>
  <circle cx="332" cy="251" r="3" fill="#6ee7b7"/>
  <!-- plug icon area -->
  <rect x="338" y="272" width="74" height="52" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="375" y="301" text-anchor="middle" font-size="22" fill="#059669">🔌</text>
  <!-- label -->
  <text x="385" y="338" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">Plugin Binary</text>
  <text x="385" y="354" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">RPC Server</text>
  <text x="385" y="370" text-anchor="middle" font-size="10" fill="#6b7280">hashicorp/go-plugin</text>

  <!-- ══════════════════════════════════════════════════════════════════
       [D] AnalysisRun / Rollout  ── lib [23]: Web Application style
       Position: bottom-centre of cluster
  ══════════════════════════════════════════════════════════════════ -->
  <!-- lib [23]: browser window with traffic-light dots -->
  <rect x="56" y="458" width="596" height="148" rx="10"
        fill="#ffffff" stroke="#475569" stroke-width="2" filter="url(#sh)"/>
  <!-- browser chrome bar -->
  <rect x="56" y="458" width="596" height="20" rx="10" fill="#e2e8ef"/>
  <rect x="56" y="468" width="596" height="10" fill="#e2e8ef"/>
  <!-- traffic-light dots -->
  <circle cx="74"  cy="468" r="5" fill="#fc5454"/>
  <circle cx="90"  cy="468" r="5" fill="#fdbc40"/>
  <circle cx="106" cy="468" r="5" fill="#33c748"/>
  <!-- URL bar pill -->
  <rect x="126" y="462" width="200" height="12" rx="5" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="226" y="472" text-anchor="middle" font-size="8" fill="#64748b">argoproj.io/v1alpha1/AnalysisRun</text>

  <!-- Two sub-panels inside the browser: Canary + AnalysisTemplate -->
  <!-- Canary panel -->
  <rect x="72" y="488" width="276" height="104" rx="8"
        fill="#fefce8" stroke="#d97706" stroke-width="1.5"/>
  <text x="210" y="508" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Rollout (Canary)</text>
  <rect x="88" y="518" width="110" height="28" rx="5" fill="#fde68a" stroke="#f59e0b" stroke-width="1"/>
  <text x="143" y="537" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">stable pods</text>
  <rect x="212" y="518" width="120" height="28" rx="5" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="272" y="537" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">canary pods</text>
  <!-- traffic split indicator -->
  <rect x="88" y="556" width="66" height="8" rx="3" fill="#f59e0b"/>
  <rect x="154" y="556" width="146" height="8" rx="3" fill="#16a34a"/>
  <text x="121" y="579" text-anchor="middle" font-size="9" fill="#92400e">90% traffic</text>
  <text x="227" y="579" text-anchor="middle" font-size="9" fill="#14532d">10% canary</text>

  <!-- AnalysisTemplate panel -->
  <rect x="364" y="488" width="276" height="104" rx="8"
        fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="502" y="508" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">AnalysisTemplate</text>
  <text x="380" y="528" font-size="10" fill="#374151">metricType: application</text>
  <text x="380" y="543" font-size="10" fill="#374151">metricId: calls.erroneous.rate</text>
  <text x="380" y="558" font-size="10" fill="#374151">successCondition: result &lt; 0.01</text>
  <text x="380" y="573" font-size="10" fill="#374151">failureLimit: 3</text>
  <text x="380" y="588" font-size="10" fill="#374151">provider.plugin: argoproj-labs/...</text>

  <!-- ══════════════════════════════════════════════════════════════════
       [E] IBM Instana Cloud  ── lib [19]: Cloud shape
       Position: right side, outside cluster
  ══════════════════════════════════════════════════════════════════ -->
  <!-- lib [19] cloud: base rect + multiple ellipses -->
  <!-- cloud shape group centred at (880, 320) -->
  <!-- base rect -->
  <rect x="800" y="330" width="218" height="78" rx="10"
        fill="#dbeafe" stroke="none"/>
  <!-- cloud bumps (ellipses) -->
  <ellipse cx="840" cy="318" rx="46" ry="44" fill="#dbeafe"/>
  <ellipse cx="890" cy="300" rx="60" ry="58" fill="#dbeafe"/>
  <ellipse cx="945" cy="314" rx="48" ry="46" fill="#dbeafe"/>
  <ellipse cx="985" cy="328" rx="38" ry="36" fill="#dbeafe"/>
  <!-- cloud border (drawn on top) -->
  <rect x="800" y="336" width="218" height="70" rx="8"
        fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <!-- top arc border hint -->
  <path d="M800,356 Q822,290 868,296 Q886,254 928,260 Q968,252 994,286 Q1020,280 1018,336"
        fill="none" stroke="#2563eb" stroke-width="2"/>

  <!-- IBM Instana badge inside cloud -->
  <!-- Instana "I" column icon (simplified) -->
  <rect x="830" y="346" width="8"  height="50" rx="2" fill="#ff6900"/>
  <rect x="843" y="346" width="8"  height="50" rx="2" fill="#ff6900"/>
  <rect x="856" y="346" width="8"  height="50" rx="2" fill="#ff6900"/>
  <rect x="869" y="346" width="8"  height="50" rx="2" fill="#ff6900"/>
  <text x="920" y="363" font-size="13" font-weight="700" fill="#1e40af">IBM Instana</text>
  <text x="920" y="380" font-size="10" fill="#1d4ed8">Application Monitoring</text>
  <text x="920" y="395" font-size="10" fill="#1d4ed8">Infrastructure Monitoring</text>

  <!-- API endpoint labels (below cloud) -->
  <rect x="786" y="418" width="246" height="34" rx="6"
        fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="909" y="432" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">/api/application-monitoring/metrics</text>
  <text x="909" y="446" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">/api/infrastructure-monitoring/metrics</text>

  <!-- Decision badges (below API box) -->
  <rect x="786" y="462" width="112" height="44" rx="8"
        fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
  <text x="842" y="480" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">✓  GO</text>
  <text x="842" y="498" text-anchor="middle" font-size="10" fill="#166534">promote canary</text>

  <rect x="914" y="462" width="118" height="44" rx="8"
        fill="#fff1f2" stroke="#dc2626" stroke-width="2" filter="url(#sh)"/>
  <text x="973" y="480" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">✕  ROLLBACK</text>
  <text x="973" y="498" text-anchor="middle" font-size="10" fill="#991b1b">restore stable</text>

  <!-- ══════════════════════════════════════════════════════════════════
       [F] K8s Secret (credentials)  ── lib [3]: rack-server small
       Position: bottom-left inside cluster
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="56" y="620" width="596" height="0"/><!-- spacer -->

  <!-- ══════════════════════════════════════════════════════════════════
       ARROWS & CONNECTORS
  ══════════════════════════════════════════════════════════════════ -->

  <!-- (1) ConfigMap ──reads──▶ Controller  (downward) -->
  <line x1="135" y1="198" x2="135" y2="246"
        stroke="#2563eb" stroke-width="2" marker-end="url(#ah-pur)"/>
  <rect x="88" y="213" width="60" height="17" rx="4" fill="#eff6ff"/>
  <text x="118" y="225" text-anchor="middle" font-size="10" fill="#2563eb">reads config</text>

  <!-- (2) Controller ──spawns──▶ Plugin (horizontal) -->
  <line x1="214" y1="308" x2="304" y2="308"
        stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ah-pur)"/>
  <rect x="220" y="293" width="68" height="17" rx="4" fill="#ede9fe"/>
  <text x="254" y="305" text-anchor="middle" font-size="10" fill="#7c3aed">spawns (RPC)</text>

  <!-- (3) Controller ──watches──▶ AnalysisRun (downward) -->
  <line x1="135" y1="368" x2="135" y2="456"
        stroke="#374151" stroke-width="2" marker-end="url(#ah-blk)"/>
  <rect x="60" y="398" width="68" height="17" rx="4" fill="#f1f5f9"/>
  <text x="94" y="410" text-anchor="middle" font-size="10" fill="#374151">watches</text>

  <!-- (4) Plugin ──calls Run()──▶ (down to AnalysisTemplate area) -->
  <line x1="385" y1="366" x2="502" y2="456"
        stroke="#059669" stroke-width="2" marker-end="url(#ah-grn)"/>
  <rect x="388" y="400" width="72" height="17" rx="4" fill="#ecfdf5"/>
  <text x="424" y="412" text-anchor="middle" font-size="10" fill="#059669">Run() call</text>

  <!-- (5) Plugin ──POST metrics──▶ Instana (horizontal, right) -->
  <line x1="464" y1="308" x2="786" y2="358"
        stroke="#dc2626" stroke-width="2" marker-end="url(#ah-red)"/>
  <rect x="538" y="314" width="108" height="17" rx="4" fill="#fef2f2"/>
  <text x="592" y="326" text-anchor="middle" font-size="10" fill="#dc2626">POST metrics query</text>

  <!-- (6) Instana ──JSON timeseries──▶ Plugin (return path, dashed) -->
  <line x1="786" y1="380" x2="464" y2="340"
        stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-grn)"/>
  <rect x="538" y="342" width="108" height="17" rx="4" fill="#ecfdf5"/>
  <text x="592" y="354" text-anchor="middle" font-size="10" fill="#059669">[ts, value] response</text>

  <!-- (7) AnalysisRun ──result──▶ Decision (GO/ROLLBACK) -->
  <line x1="652" y1="530" x2="784" y2="484"
        stroke="#374151" stroke-width="2" marker-end="url(#ah-blk)"/>
  <rect x="664" y="494" width="78" height="17" rx="4" fill="#f1f5f9"/>
  <text x="703" y="506" text-anchor="middle" font-size="10" fill="#374151">Measurement</text>

  <!-- ══════════════════════════════════════════════════════════════════
       LEGEND  (bottom strip)
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="0" y="638" width="1060" height="42" fill="#1c1c2e"/>
  <!-- RPC legend -->
  <line x1="26" y1="659" x2="64" y2="659" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="70" y="663" font-size="10" fill="#c4b5fd">RPC / spawn</text>
  <!-- HTTP legend -->
  <line x1="168" y1="659" x2="206" y2="659" stroke="#dc2626" stroke-width="2"/>
  <text x="212" y="663" font-size="10" fill="#fca5a5">HTTP POST (metrics query)</text>
  <!-- Response legend -->
  <line x1="378" y1="659" x2="416" y2="659" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="422" y="663" font-size="10" fill="#6ee7b7">JSON response</text>
  <!-- Control legend -->
  <line x1="530" y1="659" x2="568" y2="659" stroke="#374151" stroke-width="2"/>
  <text x="574" y="663" font-size="10" fill="#9da8c0">Control / watches</text>
  <!-- Config legend -->
  <line x1="696" y1="659" x2="734" y2="659" stroke="#2563eb" stroke-width="2"/>
  <text x="740" y="663" font-size="10" fill="#93c5fd">Config read</text>
  <!-- credit -->
  <text x="1040" y="663" text-anchor="end" font-size="9" fill="#4b5563">github.com/irfadkp/rollouts-plugin-metric-instana</text>

</svg>
