<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 760" width="1160" height="760" font-family="-apple-system,Segoe UI,system-ui,sans-serif">

  <!-- background -->
  <rect width="1160" height="760" fill="#ffffff"/>

  <!-- ─────────────────────────────────────────────── -->
  <!-- TITLE -->
  <!-- ─────────────────────────────────────────────── -->
  <text x="580" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1e1e">rollouts-plugin-metric-instana — Runtime Flow</text>
  <text x="580" y="54" text-anchor="middle" font-size="14" fill="#57606a">How Argo Rollouts uses the IBM Instana plugin for canary analysis</text>

  <!-- ─────────────────────────────────────────────── -->
  <!-- ROW 1 : Kubernetes cluster band -->
  <!-- ─────────────────────────────────────────────── -->
  <rect x="10" y="68" width="1140" height="118" rx="10" fill="#dbe4ff" fill-opacity="0.5" stroke="#4a9eed" stroke-width="1"/>
  <text x="22" y="84" font-size="12" fill="#2563eb">Kubernetes Cluster</text>

  <!-- ConfigMap -->
  <rect x="20" y="90" width="160" height="68" rx="8" fill="#a5d8ff" stroke="#2563eb" stroke-width="2"/>
  <text x="100" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">ConfigMap</text>
  <text x="100" y="138" text-anchor="middle" font-size="12" fill="#1e40af">argo-rollouts-config</text>

  <!-- Controller -->
  <rect x="220" y="90" width="160" height="68" rx="8" fill="#d0bfff" stroke="#7c3aed" stroke-width="2"/>
  <text x="300" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">Argo Rollouts</text>
  <text x="300" y="138" text-anchor="middle" font-size="12" fill="#5b21b6">Controller</text>

  <!-- Plugin binary -->
  <rect x="420" y="90" width="160" height="68" rx="8" fill="#b2f2bb" stroke="#15803d" stroke-width="2"/>
  <text x="500" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">Plugin Binary</text>
  <text x="500" y="138" text-anchor="middle" font-size="12" fill="#14532d">(RPC Server)</text>

  <!-- AnalysisTemplate -->
  <rect x="620" y="90" width="195" height="68" rx="8" fill="#fff3bf" stroke="#b45309" stroke-width="2"/>
  <text x="717" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">AnalysisTemplate</text>
  <text x="717" y="136" text-anchor="middle" font-size="12" fill="#92400e">instana plugin config</text>

  <!-- Rollout -->
  <rect x="855" y="90" width="195" height="68" rx="8" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2"/>
  <text x="952" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Rollout</text>
  <text x="952" y="136" text-anchor="middle" font-size="12" fill="#92400e">canary in progress</text>

  <!-- arrows row 1 -->
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
    <marker id="ah_blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2563eb"/></marker>
    <marker id="ah_purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#7c3aed"/></marker>
    <marker id="ah_green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#15803d"/></marker>
    <marker id="ah_orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#b45309"/></marker>
    <marker id="ah_red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ef4444"/></marker>
    <marker id="ah_yellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f59e0b"/></marker>
    <marker id="ah_gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#9ca3af"/></marker>
  </defs>

  <line x1="180" y1="124" x2="218" y2="124" stroke="#2563eb" stroke-width="2" marker-end="url(#ah_blue)"/>
  <text x="199" y="117" text-anchor="middle" font-size="10" fill="#2563eb">1. read</text>

  <line x1="380" y1="124" x2="418" y2="124" stroke="#7c3aed" stroke-width="2" marker-end="url(#ah_purple)"/>
  <text x="399" y="117" text-anchor="middle" font-size="10" fill="#7c3aed">2. spawn</text>

  <line x1="618" y1="124" x2="582" y2="124" stroke="#b45309" stroke-width="2" marker-end="url(#ah_orange)"/>
  <text x="600" y="117" text-anchor="middle" font-size="10" fill="#b45309">3. tick</text>

  <line x1="853" y1="124" x2="817" y2="124" stroke="#f59e0b" stroke-width="2" marker-end="url(#ah_yellow)"/>

  <!-- ─────────────────────────────────────────────── -->
  <!-- SECTION LABEL -->
  <!-- ─────────────────────────────────────────────── -->
  <text x="20" y="212" font-size="15" font-weight="700" fill="#1e1e1e">Per-interval analysis cycle</text>

  <!-- ─────────────────────────────────────────────── -->
  <!-- STEP BOXES ROW 2 -->
  <!-- ─────────────────────────────────────────────── -->

  <!-- Step 1 -->
  <rect x="10" y="226" width="190" height="90" rx="8" fill="#d0bfff" stroke="#7c3aed" stroke-width="2"/>
  <text x="20" y="244" font-size="11" fill="#7c3aed" font-weight="700">Step 1</text>
  <text x="20" y="263" font-size="13" font-weight="600" fill="#1e1e1e">Controller calls Run()</text>
  <text x="20" y="281" font-size="12" fill="#57606a">over RPC unix socket</text>
  <text x="20" y="298" font-size="11" fill="#57606a">→ plugin.Run(AnalysisRun, Metric)</text>

  <line x1="200" y1="271" x2="238" y2="271" stroke="#7c3aed" stroke-width="2" marker-end="url(#ah_purple)"/>

  <!-- Step 2 -->
  <rect x="240" y="226" width="210" height="90" rx="8" fill="#b2f2bb" stroke="#15803d" stroke-width="2"/>
  <text x="250" y="244" font-size="11" fill="#15803d" font-weight="700">Step 2  (inside plugin)</text>
  <text x="250" y="263" font-size="13" font-weight="600" fill="#1e1e1e">Parse JSON config from</text>
  <text x="250" y="281" font-size="12" fill="#57606a">metric.Provider.Plugin key</text>
  <text x="250" y="298" font-size="12" fill="#57606a">Resolve credentials</text>

  <line x1="450" y1="271" x2="488" y2="271" stroke="#15803d" stroke-width="2" marker-end="url(#ah_green)"/>

  <!-- Step 3 -->
  <rect x="490" y="226" width="215" height="90" rx="8" fill="#fff3bf" stroke="#b45309" stroke-width="2"/>
  <text x="500" y="244" font-size="11" fill="#b45309" font-weight="700">Step 3</text>
  <text x="500" y="263" font-size="13" font-weight="600" fill="#1e1e1e">Branch on metricType</text>
  <text x="500" y="283" font-size="12" fill="#15803d">application  →  POST</text>
  <text x="500" y="301" font-size="12" fill="#0e7490">infrastructure  →  POST</text>

  <line x1="705" y1="271" x2="743" y2="271" stroke="#b45309" stroke-width="2" marker-end="url(#ah_orange)"/>

  <!-- IBM Instana box -->
  <rect x="745" y="212" width="230" height="115" rx="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="3"/>
  <text x="860" y="232" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">IBM Instana REST API</text>
  <text x="755" y="253" font-size="11" fill="#1e1e1e">POST /api/application-monitoring</text>
  <text x="755" y="269" font-size="11" fill="#1e1e1e">     /metrics/applications</text>
  <line x1="755" y1="280" x2="970" y2="280" stroke="#e5e7eb" stroke-width="1"/>
  <text x="755" y="296" font-size="11" fill="#1e1e1e">POST /api/infrastructure-monitoring</text>
  <text x="755" y="312" font-size="11" fill="#1e1e1e">     /metrics</text>

  <!-- response dashed arrow -->
  <line x1="743" y1="293" x2="707" y2="293" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ah_red)"/>
  <text x="725" y="307" text-anchor="middle" font-size="10" fill="#ef4444">JSON [{ts,val}]</text>

  <!-- ─────────────────────────────────────────────── -->
  <!-- STEP BOXES ROW 3 -->
  <!-- ─────────────────────────────────────────────── -->

  <!-- Step 4 -->
  <rect x="10" y="350" width="215" height="82" rx="8" fill="#fff3bf" stroke="#f59e0b" stroke-width="2"/>
  <text x="20" y="368" font-size="11" fill="#b45309" font-weight="700">Step 4</text>
  <text x="20" y="388" font-size="13" font-weight="600" fill="#1e1e1e">extractValue()</text>
  <text x="20" y="406" font-size="12" fill="#57606a">pick last [timestamp, value]</text>
  <text x="20" y="422" font-size="12" fill="#57606a">from timeseries response</text>

  <line x1="225" y1="391" x2="263" y2="391" stroke="#f59e0b" stroke-width="2" marker-end="url(#ah_yellow)"/>

  <!-- Step 5 -->
  <rect x="265" y="350" width="215" height="82" rx="8" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2"/>
  <text x="275" y="368" font-size="11" fill="#b45309" font-weight="700">Step 5</text>
  <text x="275" y="388" font-size="13" font-weight="600" fill="#1e1e1e">evaluate.EvaluateResult()</text>
  <text x="275" y="406" font-size="12" fill="#57606a">check successCondition</text>
  <text x="275" y="422" font-size="12" fill="#57606a">check failureCondition</text>

  <line x1="480" y1="391" x2="518" y2="391" stroke="#f59e0b" stroke-width="2" marker-end="url(#ah_yellow)"/>

  <!-- Step 6 - phases -->
  <rect x="520" y="338" width="620" height="106" rx="8" fill="#dbe4ff" fill-opacity="0.6" stroke="#4a9eed" stroke-width="2"/>
  <text x="532" y="357" font-size="14" font-weight="700" fill="#2563eb">Step 6 — Measurement returned to controller</text>
  <rect x="532" y="366" width="130" height="46" rx="6" fill="#b2f2bb" stroke="#15803d" stroke-width="2"/>
  <text x="597" y="394" text-anchor="middle" font-size="14" font-weight="600" fill="#14532d">Successful</text>
  <rect x="676" y="366" width="120" height="46" rx="6" fill="#ffc9c9" stroke="#ef4444" stroke-width="2"/>
  <text x="736" y="394" text-anchor="middle" font-size="14" font-weight="600" fill="#b91c1c">Failed</text>
  <rect x="810" y="366" width="120" height="46" rx="6" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2"/>
  <text x="870" y="394" text-anchor="middle" font-size="14" font-weight="600" fill="#92400e">Error</text>
  <rect x="944" y="366" width="140" height="46" rx="6" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
  <text x="1014" y="394" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Inconclusive</text>

  <!-- ─────────────────────────────────────────────── -->
  <!-- DECISION ROW -->
  <!-- ─────────────────────────────────────────────── -->
  <text x="20" y="490" font-size="14" font-weight="700" fill="#1e1e1e">Decision</text>

  <rect x="100" y="502" width="390" height="62" rx="8" fill="#b2f2bb" stroke="#15803d" stroke-width="3"/>
  <text x="295" y="529" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">GO</text>
  <text x="295" y="550" text-anchor="middle" font-size="13" fill="#14532d">Canary promoted → 100% traffic</text>

  <rect x="570" y="502" width="390" height="62" rx="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="3"/>
  <text x="765" y="529" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">ROLLBACK</text>
  <text x="765" y="550" text-anchor="middle" font-size="13" fill="#b91c1c">Stable version restored</text>

  <!-- dashed arrows from Successful → GO and Failed → ROLLBACK -->
  <line x1="597" y1="412" x2="295" y2="500" stroke="#15803d" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ah_green)"/>
  <line x1="736" y1="412" x2="765" y2="500" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ah_red)"/>

  <!-- ─────────────────────────────────────────────── -->
  <!-- CREDENTIAL RESOLUTION -->
  <!-- ─────────────────────────────────────────────── -->
  <text x="20" y="600" font-size="14" font-weight="700" fill="#1e1e1e">Credential resolution order</text>

  <rect x="20" y="614" width="310" height="46" rx="6" fill="#e5dbff" stroke="#7c3aed" stroke-width="2"/>
  <text x="175" y="642" text-anchor="middle" font-size="13" fill="#5b21b6">1.  endpoint + apiToken  in config</text>

  <line x1="330" y1="637" x2="365" y2="637" stroke="#9ca3af" stroke-width="2" marker-end="url(#ah_gray)"/>

  <rect x="368" y="614" width="430" height="46" rx="6" fill="#e5dbff" stroke="#7c3aed" stroke-width="2"/>
  <text x="583" y="642" text-anchor="middle" font-size="13" fill="#5b21b6">2.  INSTANA_ENDPOINT  /  INSTANA_API_TOKEN  env vars</text>

  <!-- note -->
  <rect x="10" y="680" width="1130" height="36" rx="6" fill="#f7f8fa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="575" y="703" text-anchor="middle" font-size="12" fill="#57606a">Plugin runs as a child process of the Rollouts controller and inherits its Kubernetes RBAC permissions. All calls are synchronous — Run() completes before returning.</text>

  <!-- legend dots -->
  <circle cx="20" cy="748" r="6" fill="#d0bfff" stroke="#7c3aed" stroke-width="2"/>
  <text x="32" y="752" font-size="12" fill="#57606a">Controller</text>
  <circle cx="120" cy="748" r="6" fill="#b2f2bb" stroke="#15803d" stroke-width="2"/>
  <text x="132" y="752" font-size="12" fill="#57606a">Plugin</text>
  <circle cx="200" cy="748" r="6" fill="#ffc9c9" stroke="#ef4444" stroke-width="2"/>
  <text x="212" y="752" font-size="12" fill="#57606a">Instana API</text>
  <circle cx="310" cy="748" r="6" fill="#fff3bf" stroke="#b45309" stroke-width="2"/>
  <text x="322" y="752" font-size="12" fill="#57606a">Processing</text>
  <circle cx="420" cy="748" r="6" fill="#b2f2bb" stroke="#15803d" stroke-width="2"/>
  <text x="432" y="752" font-size="12" fill="#57606a">Success path</text>
  <circle cx="540" cy="748" r="6" fill="#ffc9c9" stroke="#ef4444" stroke-width="2"/>
  <text x="552" y="752" font-size="12" fill="#57606a">Failure path</text>

</svg>
